<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Sebaran - SIPEDULI BADUNG 2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header p-3 text-center">
            <i class="bi bi-heart-pulse-fill fs-2 text-white"></i>
            <h6 class="text-white fw-bold mt-2 mb-0">SIPEDULI BADUNG 2.0</h6>
            <small class="text-white-50">Peta Sebaran</small>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link-sidebar"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a href="data-disabilitas.html" class="nav-link-sidebar"><i class="bi bi-people me-2"></i>Data Disabilitas</a>
            <a href="asesmen.html" class="nav-link-sidebar"><i class="bi bi-clipboard2-check me-2"></i>e-Asesmen</a>
            <a href="bantuan.html" class="nav-link-sidebar"><i class="bi bi-gift me-2"></i>Bantuan</a>
            <a href="monitoring.html" class="nav-link-sidebar"><i class="bi bi-graph-up me-2"></i>Monitoring</a>
            <a href="peta.html" class="nav-link-sidebar active"><i class="bi bi-geo-alt me-2"></i>Peta</a>
            <a href="laporan.html" class="nav-link-sidebar"><i class="bi bi-file-earmark-bar-graph me-2"></i>Laporan</a>
            <a href="pimpinan.html" class="nav-link-sidebar"><i class="bi bi-bar-chart-line me-2"></i>Dashboard Pimpinan</a>
            <hr class="text-white-50 mx-3">
            <a href="login.html" class="nav-link-sidebar text-danger" onclick="sessionStorage.clear()"><i class="bi bi-box-arrow-right me-2"></i>Keluar</a>
        </nav>
    </div>

    <div class="main-content">
        <nav class="navbar top-navbar shadow-sm px-4">
            <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5 class="mb-0 fw-bold" style="color: var(--maroon);">Peta Sebaran Geospasial</h5>
        </nav>

        <div class="content-area p-4">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label small fw-semibold">Filter Kecamatan</label>
                            <select class="form-select form-select-sm" id="filterKec" onchange="applyFilter()">
                                <option value="">Semua Kecamatan</option>
                                <option>Kuta</option><option>Kuta Selatan</option>
                                <option>Abiansemal</option><option>Mengwi</option><option>Petang</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-semibold">Filter DTKS</label>
                            <select class="form-select form-select-sm" id="filterDtks" onchange="applyFilter()">
                                <option value="">Semua</option>
                                <option>Ya</option><option>Tidak</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-semibold">Legenda Warna</label>
                            <div class="d-flex gap-2 mt-1">
                                <span class="badge bg-danger">Desil 1-3</span>
                                <span class="badge bg-warning text-dark">Desil 4-5</span>
                                <span class="badge bg-success">Desil 6-10</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div id="mapPeta" style="height: 600px; border-radius: 8px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/helper.js"></script>
    <script>
        const map = L.map('mapPeta').setView([-8.8006, 115.1785], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        
        let allData = [];
        let markers = [];

        document.addEventListener('DOMContentLoaded', async () => {
            showLoading('Memuat data peta...');
            const result = await getDisabilitas({});
            hideLoading();
            if (result && result.success) {
                allData = result.data;
                renderMarkers(allData);
            }
        });

        function renderMarkers(data) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            data.forEach(d => {
                // Gunakan koordinat default kecamatan jika tidak ada lat/long spesifik
                let lat = d.latitude || -8.8006;
                let lng = d.longitude || 115.1785;
                
                // Randomize sedikit agar tidak menumpuk di titik yang sama persis
                if (!d.latitude) {
                    lat += (Math.random() - 0.5) * 0.05;
                    lng += (Math.random() - 0.5) * 0.05;
                }

                const desil = parseInt(d.desil) || 10;
                let warna = '#198754'; // Hijau
                if (desil <= 3) warna = '#dc3545'; // Merah
                else if (desil <= 5) warna = '#ffc107'; // Kuning

                const marker = L.circleMarker([lat, lng], {
                    radius: 12, fillColor: warna, color: '#fff', weight: 2, fillOpacity: 0.8
                }).addTo(map);
                
                marker.bindPopup(`
                    <strong>${d.nama}</strong><br>
                    <small>NIK: ${d.nik||'-'}</small><br>
                    <small>Alamat: ${d.desa||''}, ${d.kecamatan||''}</small><br>
                    <small>Disabilitas: ${d.jenis_disabilitas_uu||'-'}</small><br>
                    <small>DTKS: <b>${d.dtks||'Tidak'}</b> | Desil: <b>${d.desil||'-'}</b></small>
                `);
                markers.push(marker);
            });
        }

        function applyFilter() {
            const kec = document.getElementById('filterKec').value;
            const dtks = document.getElementById('filterDtks').value;
            
            const filtered = allData.filter(d => {
                let match = true;
                if (kec && d.kecamatan !== kec) match = false;
                if (dtks && d.dtks !== dtks) match = false;
                return match;
            });
            
            renderMarkers(filtered);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }
    </script>
</body>
</html>
